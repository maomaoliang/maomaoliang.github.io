# NexT 主题配置（覆盖默认配置）

# 使用 Mist 风格
scheme: Mist

# 文章摘要：使用 description 字段作为摘要
excerpt_description: true

# 显示"阅读全文"按钮
read_more_btn: true

# [B] 暗色模式 - 读者可切换深色主题
darkmode: true

# 全局字体设置 - 调整全站字体大小
font:
  enable: true
  global:
    size: 0.875

# 站点图标
favicon:
  small: /images/favicon-16x16-next.png
  medium: /images/favicon-32x32-next.png
  apple_touch_icon: /images/apple-touch-icon-next.png

# 头像
avatar:
  url: /images/avatar.jpg
  rounded: true
  rotated: false

# 菜单
menu:
  home: / || fa fa-home
  archives: /archives/ || fa fa-archive
  categories: /categories/ || fa fa-th
  tags: /tags/ || fa fa-tags
  about: /about/ || fa fa-user

# 社交链接
social:
  GitHub: https://github.com/maomaoliang || fab fa-github

# 搜索
local_search:
  enable: true

# 代码高亮
codeblock:
  copy_button:
    enable: true
  # [D] Mac 风格代码块 - 左上角红黄绿三个小圆点
  style: mac

# 返回顶部
back2top:
  enable: true
  sidebar: false
  scrollpercent: true

# [A] 阅读进度条 - 页面顶部显示彩色进度条
reading_progress:
  enable: true
  position: top
  color: "#37c6c0"
  height: 3px

# [C] 文章字数统计 & 阅读时长
symbols_count_time:
  separated_meta: true
  item_text_post: true
  item_text_total: true

# Google Analytics 4
google_analytics:
  tracking_id: G-H1DQE10TXJ
  only_pageview: false

# [E] 不蒜子访问量统计（已替换为 GA4）
busuanzi_count:
  enable: false

# [K] Mermaid 图表支持
mermaid:
  enable: true
  theme:
    light: default
    dark: dark

# [M] 图片灯箱 FancyBox - 点击图片放大查看
fancybox: true

# [2] 图片懒加载 - 滚动到可见区域才加载，提升首屏速度
lazyload: true

# [3] 相关文章推荐 - 基于标签匹配，文章底部自动推荐
related_posts:
  enable: true
  icon: fa fa-signs-post
  max_count: 5

# [4] 中英文自动加空格 (Pangu) - 排版更美观
pangu: true

# 创意共用协议
creative_commons:
  license: by-nc-sa
  sidebar: false
  post: true

# Giscus 评论系统
giscus:
  enable: true
  repo: maomaoliang/maomaoliang.github.io
  repo_id: MDEwOlJlcG9zaXRvcnk0NzExNjkzMg==
  category: Announcements
  category_id: DIC_kwDOAs7yhM4C4AnB
  mapping: pathname
  strict: 0
  reactions_enabled: 1
  emit_metadata: 0
  input_position: bottom
  theme: preferred_color_scheme
  lang: zh-CN

# [I] 鼠标点击爱心特效 + [H] 看板娘
custom_file_path:
  bodyEnd: source/_data/body-end.njk
  style: source/_data/styles.styl
